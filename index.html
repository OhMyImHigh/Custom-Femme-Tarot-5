<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Femme Fatale Tarot</title>
  <style>
    /* Reset & Deep Minimalist Theme */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      background-color: #050505; 
      color: #e0e0e0; 
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
      text-align: center; 
      padding: 50px 15px;
      overflow-x: hidden;
    }

    h1 { 
      font-size: 2.2rem;
      letter-spacing: 5px; 
      text-transform: uppercase; 
      margin-bottom: 60px; 
      font-weight: 200;
      color: #ffffff;
    }

    /* Deck Layout */
    .deck-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
      gap: 35px; 
      justify-items: center; 
      max-width: 1400px; 
      margin: 0 auto; 
    }

    /* Card Structure */
    .card-container { 
      width: 220px; 
      height: 360px; 
      perspective: 1200px; 
      cursor: pointer;
    }

    .card-inner { 
      width: 100%; 
      height: 100%; 
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); 
      transform-style: preserve-3d; 
      position: relative; 
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }

    .card-inner.is-flipped { 
      transform: rotateY(180deg); 
    }

    /* Front and Back Styling */
    .card-front, .card-back { 
      backface-visibility: hidden; 
      position: absolute; 
      top: 0; left: 0; 
      width: 100%; height: 100%; 
      border-radius: 12px; 
      overflow: hidden; 
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Dark Reveal Face */
    .card-front { 
      z-index: 2; 
      background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
    }

    .card-front p { 
      color: #555; 
      text-transform: uppercase; 
      font-size: 0.75rem; 
      letter-spacing: 2px;
    }

    /* Card Image Face */
    .card-back { 
      transform: rotateY(180deg); 
      z-index: 1; 
      background-color: #000;
    }

    .card-back img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      display: block;
    }

    /* Mobile Adaptability */
    @media (max-width: 500px) {
      .card-container { width: 160px; height: 260px; }
      h1 { font-size: 1.4rem; }
      .deck-grid { gap: 20px; }
    }
  </style>
</head>
<body>

  <h1>Femme Fatale Tarot</h1>
  <div class="deck-grid" id="grid"></div>

  <script>
    // Major Arcana
    const majorArcana = [
      "The Siren", "The Mirror Queen", "The Power Femme", "The Protector", 
      "The Old Spell", "The Lovers And Liars", "The Getaway", "The Soft Knife", 
      "The Night Watcher", "The Roulette", "The Balance Act", "The Hanging Heart", 
      "The Burn", "The Alchemy", "The Addiction", "The Shatter", 
      "The Afterlight", "The Moonmilk", "The Glow Up", "The Wake-Up Call", 
      "The Crowned Self", "The Fool"
    ];

    // Numbers used (Wands, Cups, Pentacles)
    const wands = ["Ace Of Wands", "2 Of Wands", "3 Of Wands", "4 Of Wands", "5 Of Wands", "6 Of Wands", "7 Of Wands", "8 Of Wands", "9 Of Wands", "10 Of Wands", "Page Of Wands", "Knight Of Wands", "Queen Of Wands", "King Of Wands"];
    const cups = ["Ace Of Cups", "2 Of Cups", "3 Of Cups", "4 Of Cups", "5 Of Cups", "6 Of Cups", "7 Of Cups", "8 Of Cups", "9 Of Cups", "10 Of Cups", "Page Of Cups", "Knight Of Cups", "Queen Of Cups", "King Of Cups"];
    
    // Swords: SPELLED OUT as requested
    const swords = [
      "Ace Of Swords", "Two Of Swords", "Three Of Swords", "Four Of Swords", 
      "Five Of Swords", "Six Of Swords", "Seven Of Swords", "Eight Of Swords", 
      "Nine Of Swords", "Ten Of Swords", "Page Of Swords", "Knight Of Swords", 
      "Queen Of Swords", "King Of Swords"
    ];
    
    // Pentacles: Numbers used (preserving lowercase 'pentacles' for Ace/Page)
    const pentacles = [
      "Ace Of pentacles", "2 Of Pentacles", "3 Of Pentacles", "4 Of Pentacles", 
      "5 Of Pentacles", "6 Of Pentacles", "7 Of Pentacles", "8 Of Pentacles", 
      "9 Of Pentacles", "10 Of Pentacles", "Page of pentacles", "Knight Of Pentacles", 
      "Queen Of Pentacles", "King Of Pentacles"
    ];

    const fullDeck = [...majorArcana, ...wands, ...cups, ...swords, ...pentacles];
    const grid = document.getElementById('grid');
    
    // GitHub Raw URL Base
    const repoBase = "https://raw.githubusercontent.com/OhMyImHigh/Custom-Femme-Tarot-5/main/";

    fullDeck.forEach(name => {
      const container = document.createElement('div');
      container.className = 'card-container';
      
      const cardInner = document.createElement('div');
      cardInner.className = 'card-inner';
      
      const cardFront = document.createElement('div');
      cardFront.className = 'card-front';
      cardFront.innerHTML = '<p>Reveal</p>';
      
      const cardBack = document.createElement('div');
      cardBack.className = 'card-back';
      
      const img = document.createElement('img');
      img.alt = name;
      img.loading = "lazy";
      
      // Since you confirmed they are .jpeg, we use that extension.
      // encodeURIComponent is critical to handle the spaces correctly as %20 in the URL.
      img.src = repoBase + encodeURIComponent(name) + ".jpeg";

      cardBack.appendChild(img);
      cardInner.appendChild(cardFront);
      cardInner.appendChild(cardBack);
      container.appendChild(cardInner);
      
      container.onclick = () => cardInner.classList.toggle('is-flipped');
      grid.appendChild(container);
    });
  </script>
</body>
</html>
