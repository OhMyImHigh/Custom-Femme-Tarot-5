<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Femme Fatale Tarot</title>
  <style>
    /* Dark, cinematic background for the page */
    body {
      background-color: #0a0a0a;
      color: #f0f0f0;
      font-family: sans-serif;
      text-align: center;
      padding: 50px;
    }

    h1 {
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    /* Creates a responsive grid to hold your cards side-by-side */
    .deck-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      justify-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* The Flip Animation Engine */
    .card-container {
      width: 250px;
      height: 400px; /* Portrait orientation */
      perspective: 1000px;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    .card-inner.is-flipped {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      backface-visibility: hidden;
      position: absolute;
      top: 0; 
      left: 0;
      width: 100%; 
      height: 100%;
      border-radius: 10px;
      overflow: hidden;
    }

    /* The back of the card (your AI Art) */
    .card-back {
      transform: rotateY(180deg); 
    }
  </style>
</head>
<body>

  <h1>The Femme Fatale Deck</h1>

  <div class="deck-grid">

    <div class="card-container">
      <div class="card-inner">
        <div class="card-front" style="background-color: #222; border: 1px solid #444; display: flex; align-items: center; justify-content: center;">
           <p style="color: #666;">Click to Reveal</p>
        </div>
        <div class="card-back">
          <img src="Ace Of Cups.jpeg" alt="Ace Of Cups" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
      </div>
    </div>

    <div class="card-container">
      <div class="card-inner">
        <div class="card-front" style="background-color: #222; border: 1px solid #444; display: flex; align-items: center; justify-content: center;">
           <p style="color: #666;">Click to Reveal</p>
        </div>
        <div class="card-back">
          <img src="10 Of Wands.jpeg" alt="10 Of Wands" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
      </div>
    </div>

    <div class="card-container">
      <div class="card-inner">
        <div class="card-front" style="background-color: #222; border: 1px solid #444; display: flex; align-items: center; justify-content: center;">
           <p style="color: #666;">Click to Reveal</p>
        </div>
        <div class="card-back">
          <img src="Queen Of Pentacles.jpeg" alt="Queen Of Pentacles" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
      </div>
    </div>

  </div>

  <script>
    const cards = document.querySelectorAll('.card-inner');
    cards.forEach(card => {
      card.addEventListener('click', function() {
        this.classList.toggle('is-flipped');
      });
    });
  </script>

</body>
</html>
