<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Femme Fatale Tarot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      background-color: #050505; 
      color: #e0e0e0; 
      font-family: 'Segoe UI', system-ui, sans-serif; 
      text-align: center; 
      padding: 50px 15px;
    }

    h1 { 
      font-size: 2.2rem;
      letter-spacing: 5px; 
      text-transform: uppercase; 
      margin-bottom: 60px; 
      font-weight: 200;
      color: #ffffff;
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
    }

    .deck-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
      gap: 35px; 
      justify-items: center; 
      max-width: 1400px; 
      margin: 0 auto; 
    }

    .card-container { 
      width: 220px; 
      height: 360px; 
      perspective: 1200px; 
      cursor: pointer;
    }

    .card-inner { 
      width: 100%; 
      height: 100%; 
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); 
      transform-style: preserve-3d; 
      position: relative; 
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }

    .card-inner.is-flipped { 
      transform: rotateY(180deg); 
    }

    .card-front, .card-back { 
      backface-visibility: hidden; 
      position: absolute; 
      top: 0; left: 0; 
      width: 100%; height: 100%; 
      border-radius: 12px; 
      overflow: hidden; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Card Back (Face Down Design) */
    .card-front { 
      z-index: 2; 
      background-color: #1a1a1a;
    }

    .card-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Card Face (Reveal Side) */
    .card-back { 
      transform: rotateY(180deg); 
      z-index: 1; 
      background-color: #000;
    }

    .card-back.load-error {
      background-color: #300;
      font-size: 10px;
      padding: 20px;
      color: #f66;
      text-align: center;
    }

    .card-back img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      display: block;
    }
  </style>
</head>
<body>

  <h1>Femme Fatale Tarot</h1>
  <div class="deck-grid" id="grid"></div>

  <script>
    // EXACT names matched to the strings in your repository screenshots (392-396)
    const majorArcana = [
      "The Fool",             // 0 (The Fool)
      "The Siren",            // 1 (The Magician)
      "The High Priestess",   // 2 (The High Priestess)
      "The Empress",          // 3 (The Empress)
      "Emperor",              // 4 (The Emperor)
      "The Old Spell",        // 5 (The Hierophant)
      "The Lovers and Liars", // 6 (The Lovers)
      "The Getaway",          // 7 (The Chariot)
      "The Soft Knife",       // 8 (Strength/Justice depending on deck)
      "The Night Watcher",    // 9 (The Hermit)
      "The Roulette",         // 10 (Wheel of Fortune)
      "The Balance Act",      // 11 (Justice/Strength)
      "The Hanging Heart",    // 12 (The Hanged Man)
      "The Burn",             // 13 (Death)
      "The Alchemy",          // 14 (Temperance)
      "The Addiction",        // 15 (The Devil)
      "The Shatter",          // 16 (The Tower)
      "Star",                 // 17 (The Star)
      "Moon",                 // 18 (The Moon)
      "The Glow Up",          // 19 (The Sun)
      "The Wake-Up Call",     // 20 (Judgement)
      "The Crowned Self"      // 21 (The World - Final Card)
    ];

    const wands = ["Ace Of Wands", "2 Of Wands", "3 Of Wands", "4 Of Wands", "5 Of Wands", "6 Of Wands", "7 Of Wands", "8 Of Wands", "9 Of Wands", "10 Of Wands", "Page Of Wands", "Knight Of Wands", "Queen Of Wands", "King Of Wands"];
    const cups = ["Ace Of Cups", "2 Of Cups", "3 Of Cups", "4 Of Cups", "5 Of Cups", "6 Of Cups", "7 Of Cups", "8 Of Cups", "9 Of Cups", "10 Of Cups", "Page Of Cups", "Knight Of Cups", "Queen Of Cups", "King Of Cups"];
    
    // Exact spelling from repo
    const swords = [
      "Ace Of Swords", "Two Of Swords", "Three Of Swords", "Four Of Swords", 
      "Five Of Swords", "Six Of Swords", "Seven Of Swords", "8Of Swords", 
      "Nine Of Swords", "Ten Of Swords", "Page Of Swords", "Knight Of Swords", 
      "Queen Of Swords", "King Of Swords"
    ];
    
    // Exact casing from repo (pentacles lowercase)
    const pentacles = [
      "Ace Of pentacles", "2 Of Pentacles", "3 Of Pentacles", "4 Of Pentacles", 
      "5 Of Pentacles", "6 Of Pentacles", "7 Of Pentacles", "8 Of Pentacles", 
      "9 Of Pentacles", "10 Of Pentacles", "Page of pentacles", "Knight Of Pentacles", 
      "Queen Of Pentacles", "King Of Pentacles"
    ];

    const fullDeck = [...majorArcana, ...wands, ...cups, ...swords, ...pentacles];
    const grid = document.getElementById('grid');
    const repoBase = "https://raw.githubusercontent.com/OhMyImHigh/Custom-Femme-Tarot-5/main/";

    // Forced PNG for the design back
    const backDesignName = "Femme Fatale Design";

    fullDeck.forEach(name => {
      const container = document.createElement('div');
      container.className = 'card-container';
      
      const cardInner = document.createElement('div');
      cardInner.className = 'card-inner';
      
      const cardFront = document.createElement('div');
      cardFront.className = 'card-front';
      
      const backImg = document.createElement('img');
      backImg.alt = "Card Back";
      
      const loadBack = (ext) => {
        backImg.src = repoBase + encodeURIComponent(backDesignName) + ext;
      };

      backImg.onerror = function() {
          if (this.src.endsWith('.png')) loadBack(".jpeg");
          else if (this.src.endsWith('.jpeg')) loadBack(".jpg");
      };
      
      loadBack(".png");
      cardFront.appendChild(backImg);
      
      const cardBack = document.createElement('div');
      cardBack.className = 'card-back';
      
      const faceImg = document.createElement('img');
      faceImg.alt = name;
      faceImg.loading = "lazy";
      
      const tryLoadFace = (namePart, ext) => {
        faceImg.src = repoBase + encodeURIComponent(namePart) + ext;
      };

      faceImg.onerror = () => {
        const currentSrc = faceImg.src;
        if (currentSrc.includes(".jpeg")) {
            tryLoadFace(name, ".jpg");
        } else if (!currentSrc.includes("-") && name.includes(" ")) {
            const dashedName = name.replace(/ /g, "-");
            faceImg.src = repoBase + encodeURIComponent(dashedName) + ".jpeg";
        } else {
            cardBack.classList.add('load-error');
            cardBack.innerHTML = `<span>Missing:</span><br><strong>${name}</strong>`;
        }
      };

      tryLoadFace(name, ".jpeg");

      cardBack.appendChild(faceImg);
      cardInner.appendChild(cardFront);
      cardInner.appendChild(cardBack);
      container.appendChild(cardInner);
      
      container.onclick = () => cardInner.classList.toggle('is-flipped');
      grid.appendChild(container);
    });
  </script>
</body>
</html>
