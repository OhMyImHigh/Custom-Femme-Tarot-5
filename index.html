<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Femme Fatale Tarot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      background-color: #050505; 
      color: #e0e0e0; 
      font-family: 'Segoe UI', system-ui, sans-serif; 
      text-align: center; 
      padding: 50px 15px;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1 { 
      font-size: 2.5rem;
      letter-spacing: 5px; 
      text-transform: uppercase; 
      margin-bottom: 10px; 
      font-weight: 200;
      color: #ffffff;
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
    }
    
    .subtitle {
        font-style: italic;
        color: #888;
        margin-bottom: 20px;
        letter-spacing: 1px;
    }

    .api-key-box {
        margin-bottom: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
    }

    .api-key-box input {
        width: 100%;
        max-width: 400px;
        background: rgba(10, 10, 10, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 10px 15px;
        border-radius: 8px;
        color: #999;
        font-size: 0.9rem;
        text-align: center;
        transition: all 0.3s ease;
    }

    .api-key-box input:focus {
        outline: none;
        border-color: #555;
        color: #fff;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
    }

    .api-key-box a {
        color: #666;
        font-size: 0.75rem;
        text-decoration: none;
        transition: color 0.3s ease;
    }

    .api-key-box a:hover {
        color: #aaa;
    }

    .controls-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        margin-bottom: 50px;
    }

    .intention-box {
        width: 100%;
        max-width: 600px;
        position: relative;
    }

    .intention-box input {
        width: 100%;
        background: rgba(20, 20, 20, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 15px 20px;
        border-radius: 8px;
        color: #fff;
        font-size: 1.1rem;
        font-family: 'Georgia', serif;
        font-style: italic;
        transition: all 0.3s ease;
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
    }

    .intention-box input:focus {
        outline: none;
        border-color: #900;
        box-shadow: 0 0 15px rgba(153, 0, 0, 0.3), inset 0 2px 5px rgba(0,0,0,0.5);
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    button {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 10px 25px;
      font-size: 1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 30px;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
    }

    button:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
      border-color: #fff;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    #btn-interpret {
      display: none;
      border-color: #900;
      color: #fcc;
      font-weight: bold;
    }
    
    #btn-interpret:hover:not(:disabled) {
      background: rgba(153, 0, 0, 0.2);
      border-color: #f00;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
    }

    .deck-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
      gap: 35px; 
      justify-items: center; 
      max-width: 1400px; 
      margin: 0 auto; 
      transition: all 0.5s ease;
    }

    /* Layout for reading modes */
    .deck-grid.reading-mode {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 50px;
    }

    .card-container { 
      width: 220px; 
      height: 360px; 
      perspective: 1200px; 
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card-container:hover {
      transform: translateY(-10px);
    }

    .card-inner { 
      width: 100%; 
      height: 100%; 
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); 
      transform-style: preserve-3d; 
      position: relative; 
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }

    .card-container:hover .card-inner {
      box-shadow: 0 15px 40px rgba(255, 255, 255, 0.15);
    }

    .card-inner.is-flipped { 
      transform: rotateY(180deg); 
    }

    .card-front, .card-back { 
      backface-visibility: hidden; 
      position: absolute; 
      top: 0; left: 0; 
      width: 100%; height: 100%; 
      border-radius: 12px; 
      overflow: hidden; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .card-front { 
      z-index: 2; 
      background-color: #1a1a1a;
    }

    .card-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-back { 
      transform: rotateY(180deg); 
      z-index: 1; 
      background-color: #000;
    }

    .card-back.load-error {
      background-color: #300;
      font-size: 14px;
      padding: 20px;
      color: #f66;
      text-align: center;
    }

    .card-back img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      display: block;
    }

    .spread-label {
      transform: rotateY(180deg);
      position: absolute;
      bottom: -35px;
      width: 100%;
      text-align: center;
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .is-flipped .spread-label {
      opacity: 1;
    }

    /* Interpretation Reading UI */
    .reading-box {
      max-width: 800px;
      margin: 60px auto 20px auto;
      padding: 30px;
      background: linear-gradient(135deg, rgba(20, 0, 0, 0.8), rgba(10, 0, 0, 0.9));
      border: 1px solid rgba(150, 0, 0, 0.3);
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
      color: #ddd;
      text-align: left;
      font-family: 'Georgia', serif;
      font-size: 1.15rem;
      line-height: 1.8;
      display: none;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    .reading-box.active {
      display: block;
      opacity: 1;
    }

    .reading-box p {
      margin-bottom: 20px;
    }
    
    .reading-box p:last-child {
      margin-bottom: 0;
    }

    .reading-actions {
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid rgba(255,255,255,0.1);
        text-align: center;
        display: none;
    }

    #btn-listen {
        border-color: #900;
        background: rgba(150, 0, 0, 0.1);
    }
    #btn-listen:hover:not(:disabled) {
        background: rgba(150, 0, 0, 0.3);
        box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
    }

    /* Dialogue & Followup UI */
    .dialogue-section {
        margin-top: 40px;
        padding-top: 20px;
        border-top: 1px solid rgba(255,255,255,0.1);
        display: none;
    }

    .dialogue-section.active {
        display: block;
    }

    .chat-history {
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .chat-bubble {
        padding: 12px 18px;
        border-radius: 8px;
        max-width: 85%;
        font-size: 1rem;
        position: relative;
    }

    .chat-user {
        align-self: flex-end;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: #fff;
    }

    .chat-reader {
        align-self: flex-start;
        background: rgba(150, 0, 0, 0.15);
        border: 1px solid rgba(150, 0, 0, 0.3);
        color: #fcc;
        font-style: italic;
    }

    .mini-listen-btn {
        background: none;
        border: 1px solid rgba(255,255,255,0.3);
        color: #fff;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        font-size: 0.8rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        padding: 0;
        margin-left: 10px;
        vertical-align: middle;
    }

    .followup-controls {
        display: flex;
        gap: 10px;
    }

    .followup-controls input {
        flex: 1;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 10px 15px;
        border-radius: 4px;
        color: #fff;
        font-family: 'Segoe UI', sans-serif;
    }

    .followup-controls input:focus {
        outline: none;
        border-color: #900;
    }

    .followup-controls button {
        border-radius: 4px;
        font-size: 0.9rem;
        padding: 10px 20px;
    }

    .loading-text {
      font-style: italic;
      color: #888;
      text-align: center;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }
    
    .error-text {
        color: #f66;
        text-align: center;
    }
  </style>
</head>
<body>

  <h1>Femme Fatale Tarot</h1>
  <div class="subtitle">Ask the shadows, and they shall answer.</div>
  
  <div class="api-key-box">
      <input type="password" id="api-key-input" placeholder="Paste your Gemini API Key here to enable AI features..." autocomplete="off">
      <a href="https://aistudio.google.com/app/apikey" target="_blank">Get a free API key from Google AI Studio</a>
  </div>

  <div class="controls-container">
    <div class="intention-box">
        <input type="text" id="user-intention" placeholder="What seeks answers in the dark? (Enter your question...)" autocomplete="off">
    </div>

    <div class="controls">
      <button id="btn-reset">Full Deck</button>
      <button id="btn-shuffle">Shuffle Deck</button>
      <button id="btn-draw-1">✨ Card of the Day</button>
      <button id="btn-draw-3">Draw 3 Cards</button>
      <button id="btn-interpret">✨ Interpret Spread ✨</button>
    </div>
  </div>

  <div class="deck-grid" id="grid"></div>

  <!-- LLM Interpretation Container -->
  <div id="reading-box" class="reading-box">
      <div id="reading-content"></div>
      
      <div id="reading-actions" class="reading-actions">
          <button id="btn-listen">🗣️ Listen to the Shadows</button>
      </div>

      <!-- Interactive Dialogue Section -->
      <div id="dialogue-section" class="dialogue-section">
          <div id="chat-history" class="chat-history"></div>
          <div class="followup-controls">
              <input type="text" id="followup-input" placeholder="Ask her a follow-up question..." autocomplete="off" />
              <button id="btn-followup">✨ Ask ✨</button>
          </div>
      </div>
  </div>

  <script>
    const apiKey = ""; // Provided by execution environment internally
    
    // Helper function to pull the key from the UI if the internal environment is empty (like on GitHub)
    function getActiveKey() {
        const userInputKey = document.getElementById('api-key-input').value.trim();
        return apiKey || userInputKey;
    }

    // Arrays matching exact spellings, mapped with their folder names
    const majorArcana = [
      "The Fool", "The Siren", "The High Priestess", "The Empress", "Emperor", 
      "Heirophant", "The Lovers", "The Chariot", "Strength", "The Hermit", 
      "Wheel Of Fortune", "Justice", "Hanged Man", "Death", "Temperance", 
      "Devil", "Tower", "Star", "Moon", "The Sun", "Judgement", "World"
    ].map(name => ({ name, folder: 'Major Arcana' }));

    const wands = [
      "Ace Of Wands", "2 Of Wands", "3 Of Wands", "4 Of Wands", "5 Of Wands", 
      "6 Of Wands", "7 Of Wands", "8 Of Wands", "9 Of Wands", "10 Of Wands", 
      "Page Of Wands", "Knight Of Wands", "Queen Of Wands", "King Of Wands"
    ].map(name => ({ name, folder: 'Wands' }));
    
    const cups = [
      "Ace Of Cups", "2 Of Cups", "3 Of Cups", "4 Of Cups", "5 Of Cups", 
      "6 Of Cups", "7 Of Cups", "8 Of Cups", "9 Of Cups", "10 Of Cups", 
      "Page Of Cups", "Knight Of Cups", "Queen Of Cups", "King Of Cups"
    ].map(name => ({ name, folder: 'Cups' }));
    
    const swords = [
      "Ace Of Swords", "Two Of Swords", "Three Of Swords", "Four Of Swords", 
      "Five Of Swords", "Six Of Swords", "Seven Of Swords", "8Of Swords", 
      "Nine Of Swords", "Ten Of Swords", "Page Of Swords", "Knnight Of Swords", 
      "Queen Of Swords", "King Of Swords"
    ].map(name => ({ name, folder: 'Swords' }));
    
    const pentacles = [
      "Ace Of pentacles", "2 Of Pentacles", "3 Of Pentacles", "4 Of Pentacles", 
      "5 Of Pentacles", "6 Of Pentacles", "7 Of Pentacles", "8 Of Pentacles", 
      "9 Of Pentacles", "10 Of Pentacles", "Page of pentacles", "Knight Of Pentacles", 
      "Queen Of Pentacles", "King Of Pentacles"
    ].map(name => ({ name, folder: 'Pentacles' }));

    const fullDeckOriginal = [...majorArcana, ...wands, ...cups, ...swords, ...pentacles];
    const grid = document.getElementById('grid');
    const interpretBtn = document.getElementById('btn-interpret');
    const readingBox = document.getElementById('reading-box');
    const readingContent = document.getElementById('reading-content');
    const readingActions = document.getElementById('reading-actions');
    const listenBtn = document.getElementById('btn-listen');
    const dialogueSection = document.getElementById('dialogue-section');
    const chatHistory = document.getElementById('chat-history');
    const followupInput = document.getElementById('followup-input');
    const followupBtn = document.getElementById('btn-followup');
    const intentionInput = document.getElementById('user-intention');

    const backFallbacks = [
        encodeURI("Femme Fatale Design.png"),
        encodeURI("Femme Fatale Design.jpeg"),
        "https://raw.githubusercontent.com/OhMyImHigh/Custom-Femme-Tarot-5/main/Femme%20Fatale%20Design.png"
    ];

    let currentSpread = [];
    let storedContext = ""; 
    let currentReadingText = ""; // Holds text to send to TTS API

    // Function to render any array of cards to the screen
    function renderDeck(deckToRender, isReading = false) {
      grid.innerHTML = ''; 
      readingBox.classList.remove('active'); 
      readingActions.style.display = 'none';
      dialogueSection.classList.remove('active');
      chatHistory.innerHTML = '';
      storedContext = "";
      currentReadingText = "";
      
      if (isReading) {
        grid.classList.add('reading-mode');
        interpretBtn.style.display = 'inline-block';
        if(deckToRender.length === 1) {
             interpretBtn.textContent = '✨ Interpret Card ✨';
        } else {
             interpretBtn.textContent = '✨ Interpret Spread ✨';
        }
        currentSpread = deckToRender;
      } else {
        grid.classList.remove('reading-mode');
        interpretBtn.style.display = 'none';
        currentSpread = [];
      }

      const spreadLabels = ["Past", "Present", "Future"];

      deckToRender.forEach((card, index) => {
        const container = document.createElement('div');
        container.className = 'card-container';
        
        const cardInner = document.createElement('div');
        cardInner.className = 'card-inner';
        
        const cardFront = document.createElement('div');
        cardFront.className = 'card-front';
        
        const backImg = document.createElement('img');
        backImg.alt = "Card Back";
        backImg.dataset.idx = 0;
        backImg.onerror = function() {
            let i = parseInt(this.dataset.idx);
            if (i < backFallbacks.length) {
                this.src = backFallbacks[i];
                this.dataset.idx = i + 1;
            } else {
                this.onerror = null;
            }
        };
        backImg.src = backFallbacks[0];
        backImg.dataset.idx = 1;
        cardFront.appendChild(backImg);
        
        const cardBack = document.createElement('div');
        cardBack.className = 'card-back';
        
        const faceImg = document.createElement('img');
        faceImg.alt = card.name;
        faceImg.loading = "lazy";
        
        const faceFallbacks = [
            encodeURI(`${card.name}.jpeg`),
            encodeURI(`${card.folder}/${card.name}.jpeg`),
            encodeURI(`${card.name}.jpg`),
            encodeURI(`${card.folder}/${card.name}.jpg`),
            `https://raw.githubusercontent.com/OhMyImHigh/Custom-Femme-Tarot-5/main/${encodeURIComponent(card.name)}.jpeg`,
            `https://raw.githubusercontent.com/OhMyImHigh/Custom-Femme-Tarot-5/main/${encodeURIComponent(card.folder)}/${encodeURIComponent(card.name)}.jpeg`
        ];

        faceImg.dataset.idx = 0;
        faceImg.onerror = function() {
          let i = parseInt(this.dataset.idx);
          if (i < faceFallbacks.length) {
              this.src = faceFallbacks[i];
              this.dataset.idx = i + 1;
          } else {
              this.onerror = null; 
              this.style.display = 'none';
              cardBack.classList.add('load-error');
              cardBack.innerHTML = `<span>Missing File:</span><br><br><strong>${card.name}</strong>`;
          }
        };

        faceImg.src = faceFallbacks[0];
        faceImg.dataset.idx = 1;

        cardBack.appendChild(faceImg);

        // Add spread labels only if it's a 3 card spread
        if (isReading && deckToRender.length === 3 && index < 3) {
            const label = document.createElement('div');
            label.className = 'spread-label';
            label.innerText = spreadLabels[index];
            cardInner.appendChild(label);
        } else if (isReading && deckToRender.length === 1) {
            const label = document.createElement('div');
            label.className = 'spread-label';
            label.innerText = "Insight";
            cardInner.appendChild(label);
        }

        cardInner.appendChild(cardFront);
        cardInner.appendChild(cardBack);
        container.appendChild(cardInner);
        
        container.onclick = () => cardInner.classList.toggle('is-flipped');
        grid.appendChild(container);
      });
    }

    // Helper to shuffle an array
    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    // Gemini Text Generation API integration with Exponential Backoff
    async function fetchWithRetry(url, options, maxRetries = 5) {
      let delays = [1000, 2000, 4000, 8000, 16000];
      for (let i = 0; i < maxRetries; i++) {
        try {
          const response = await fetch(url, options);
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          return await response.json();
        } catch (error) {
          if (i === maxRetries - 1) throw error;
          await new Promise(resolve => setTimeout(resolve, delays[i]));
        }
      }
    }

    async function callGeminiText(promptText) {
        const activeKey = getActiveKey();
        
        const systemPrompt = `You are a mysterious, cynical, but wise 1940s noir femme fatale who reads tarot in a dimly lit, smoky speakeasy. You address the user using noir slang (kid, darling, sugar, pal). Focus on themes of ambition, secrets, danger, and allure.`;
        
        const payload = {
            contents: [{ parts: [{ text: promptText }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] }
        };

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${activeKey}`;
        
        const data = await fetchWithRetry(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
        
        return data.candidates?.[0]?.content?.parts?.[0]?.text;
    }

    // Binary conversions for TTS audio
    function base64ToArrayBuffer(base64) {
        const binaryString = window.atob(base64);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
            bytes[i] = binaryString.charCodeAt(i);
        }
        return bytes.buffer;
    }

    function pcmToWav(pcmData, sampleRate) {
        const numChannels = 1;
        const bytesPerSample = 2;
        const blockAlign = numChannels * bytesPerSample;
        const byteRate = sampleRate * blockAlign;
        const dataSize = pcmData.byteLength;
        const chunkSize = 36 + dataSize;
        const buffer = new ArrayBuffer(44 + dataSize);
        const view = new DataView(buffer);

        const writeString = (view, offset, string) => {
            for (let i = 0; i < string.length; i++) { view.setUint8(offset + i, string.charCodeAt(i)); }
        };

        writeString(view, 0, 'RIFF');
        view.setUint32(4, chunkSize, true);
        writeString(view, 8, 'WAVE');
        writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true); // PCM
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, byteRate, true);
        view.setUint16(32, blockAlign, true);
        view.setUint16(34, bytesPerSample * 8, true);
        writeString(view, 36, 'data');
        view.setUint32(40, dataSize, true);

        const pcmArray = new Uint8Array(pcmData);
        for (let i = 0; i < pcmArray.length; i++) { view.setUint8(44 + i, pcmArray[i]); }

        return new Blob([buffer], { type: 'audio/wav' });
    }

    // Gemini Text-to-Speech API Integration
    async function playTTS(text, buttonElement) {
        const activeKey = getActiveKey();
        
        if(!activeKey) { 
            if(buttonElement) {
                buttonElement.disabled = false;
                buttonElement.textContent = '❌ API Key Required';
            }
            return; 
        }
        
        if (buttonElement) {
            buttonElement.disabled = true;
            buttonElement.textContent = '⏳ Summoning Voice...';
        }

        // Strip HTML tags so the voice reads cleanly
        const cleanText = text.replace(/<[^>]+>/g, '').trim();

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${activeKey}`;
        const payload = {
            contents: [{ parts: [{ text: "Speak in a sultry, mysterious, dramatic tone: " + cleanText }] }],
            generationConfig: {
                responseModalities: ["AUDIO"],
                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Aoede" } } }
            }
        };

        try {
            const data = await fetchWithRetry(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const inlineData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;
            if (inlineData) {
                const match = inlineData.mimeType.match(/rate=(\d+)/);
                const rate = match ? parseInt(match[1]) : 24000;
                
                const pcmBuffer = base64ToArrayBuffer(inlineData.data);
                const wavBlob = pcmToWav(pcmBuffer, rate);
                const audioUrl = URL.createObjectURL(wavBlob);
                const audio = new Audio(audioUrl);
                
                audio.onplay = () => {
                    if(buttonElement) buttonElement.textContent = '🔊 Speaking...';
                };
                audio.onended = () => {
                    if(buttonElement) {
                        buttonElement.disabled = false;
                        buttonElement.textContent = '🗣️ Listen Again';
                    }
                };
                
                audio.play();
            } else {
                throw new Error("No audio data returned");
            }
        } catch (error) {
            console.error("TTS Error:", error);
            if(buttonElement) {
                buttonElement.disabled = false;
                buttonElement.textContent = '❌ Voice Lost';
            }
        }
    }

    async function interpretCards() {
        if (currentSpread.length === 0) return;
        
        if (!getActiveKey()) {
             readingBox.classList.add('active');
             readingContent.innerHTML = `<p class="error-text">The shadows are silent. (Please paste a free Gemini API Key into the box at the top of the page to unlock the AI Tarot Reader!)</p>`;
             readingBox.scrollIntoView({ behavior: 'smooth', block: 'end' });
             return;
        }

        // Auto-flip all cards for the user if they haven't yet
        document.querySelectorAll('.card-inner').forEach(card => card.classList.add('is-flipped'));
        interpretBtn.disabled = true;

        readingBox.classList.add('active');
        readingContent.innerHTML = `<p class="loading-text">The shadows are shifting... give me a moment to look closely, darling...</p>`;
        readingBox.scrollIntoView({ behavior: 'smooth', block: 'end' });

        const intent = intentionInput.value.trim();
        let userPrompt = "";

        if (currentSpread.length === 3) {
            userPrompt = `The user has drawn three cards for a Past, Present, and Future reading from a custom "Femme Fatale" tarot deck.\nPast: ${currentSpread[0].name}\nPresent: ${currentSpread[1].name}\nFuture: ${currentSpread[2].name}\n`;
            if (intent) userPrompt += `\nThe user asked this specific question before drawing: "${intent}".\n`;
            userPrompt += `Give a moody, atmospheric, and insightful interpretation of this spread answering their question. Write 3 short paragraphs weaving a cohesive narrative.`;
        } else if (currentSpread.length === 1) {
            userPrompt = `The user has drawn a single card for quick daily insight from a custom "Femme Fatale" tarot deck: ${currentSpread[0].name}.\n`;
            if (intent) userPrompt += `\nThe user asked this specific question before drawing: "${intent}".\n`;
            userPrompt += `Give a brief, punchy, moody interpretation of this single card. Write 1 or 2 short paragraphs.`;
        }

        userPrompt += ` Return the text nicely formatted with HTML paragraph tags <p>. Do not include markdown formatting, just integrate it into the prose.`;

        try {
            const textResponse = await callGeminiText(userPrompt);
            if(textResponse) {
                currentReadingText = textResponse;
                readingContent.innerHTML = textResponse;
                
                // Save context for followups
                storedContext = `Original Question: ${intent || "General Reading"}\nCards: ${currentSpread.map(c => c.name).join(', ')}\nYour Reading: ${textResponse}`;
                
                // Show actions (Listen) and dialogue section
                readingActions.style.display = 'block';
                dialogueSection.classList.add('active');
                listenBtn.textContent = '🗣️ Listen to the Shadows';
            } else {
                throw new Error("Empty response");
            }
        } catch (error) {
            readingContent.innerHTML = `<p class="error-text">Looks like the cops raided the joint and cut the power. (Network Error). Try drawing again, kid.</p>`;
        } finally {
            interpretBtn.disabled = false;
        }
    }

    async function handleFollowup() {
        const text = followupInput.value.trim();
        if(!text || !storedContext) return;

        // Add user message to UI
        const userBubble = document.createElement('div');
        userBubble.className = 'chat-bubble chat-user';
        userBubble.textContent = text;
        chatHistory.appendChild(userBubble);
        
        followupInput.value = '';
        followupBtn.disabled = true;

        // Add loading bubble
        const loadBubble = document.createElement('div');
        loadBubble.className = 'chat-bubble chat-reader loading-text';
        loadBubble.textContent = 'Thinking...';
        chatHistory.appendChild(loadBubble);
        
        dialogueSection.scrollIntoView({ behavior: 'smooth', block: 'end' });

        const followupPrompt = `Context of our reading so far:\n${storedContext}\n\nThe user now asks a follow-up question: "${text}"\n\nAnswer them directly in character (1 short paragraph). No HTML tags needed, just plain text.`;

        try {
            const response = await callGeminiText(followupPrompt);
            chatHistory.removeChild(loadBubble);
            
            if(response) {
                const readerBubble = document.createElement('div');
                readerBubble.className = 'chat-bubble chat-reader';
                
                // The text
                const textNode = document.createElement('span');
                textNode.innerHTML = response;
                readerBubble.appendChild(textNode);

                // Add mini listen button to chat responses
                const chatListenBtn = document.createElement('button');
                chatListenBtn.className = 'mini-listen-btn';
                chatListenBtn.title = 'Listen';
                chatListenBtn.innerHTML = '▶';
                chatListenBtn.onclick = () => {
                    const originalIcon = chatListenBtn.innerHTML;
                    playTTS(response, chatListenBtn).then(() => {
                        chatListenBtn.innerHTML = originalIcon;
                    });
                };
                readerBubble.appendChild(chatListenBtn);

                chatHistory.appendChild(readerBubble);
                
                // Update context memory
                storedContext += `\nUser asked: ${text}\nYou answered: ${response}`;
            }
        } catch(err) {
            chatHistory.removeChild(loadBubble);
            const errorBubble = document.createElement('div');
            errorBubble.className = 'chat-bubble chat-reader error-text';
            errorBubble.textContent = "I lost my train of thought, darling. The connection is bad tonight.";
            chatHistory.appendChild(errorBubble);
        } finally {
            followupBtn.disabled = false;
            dialogueSection.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }
    }

    // Event Listeners for Buttons
    document.getElementById('btn-reset').addEventListener('click', () => {
      renderDeck(fullDeckOriginal, false);
      intentionInput.value = '';
    });

    document.getElementById('btn-shuffle').addEventListener('click', () => {
      const shuffledDeck = shuffleArray(fullDeckOriginal);
      renderDeck(shuffledDeck, false);
    });

    document.getElementById('btn-draw-1').addEventListener('click', () => {
      const shuffledDeck = shuffleArray(fullDeckOriginal);
      const drawnCards = shuffledDeck.slice(0, 1); // Take top 1
      renderDeck(drawnCards, true);
    });

    document.getElementById('btn-draw-3').addEventListener('click', () => {
      const shuffledDeck = shuffleArray(fullDeckOriginal);
      const drawnCards = shuffledDeck.slice(0, 3); // Take top 3
      renderDeck(drawnCards, true);
    });

    interpretBtn.addEventListener('click', interpretCards);
    listenBtn.addEventListener('click', () => playTTS(currentReadingText, listenBtn));
    
    followupBtn.addEventListener('click', handleFollowup);
    followupInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleFollowup();
    });

    // Initial render
    renderDeck(fullDeckOriginal, false);
  </script>
</body>
</html>
