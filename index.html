<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Femme Fatale Tarot</title>
  <style>
    body { background-color: #0a0a0a; color: #f0f0f0; font-family: sans-serif; text-align: center; padding: 50px; }
    h1 { letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; }
    .deck-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; justify-items: center; max-width: 1200px; margin: 0 auto; }
    
    .card-container { width: 250px; height: 400px; perspective: 1000px; }
    
    .card-inner {
      width: 100%; height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      cursor: pointer;
      position: relative;
    }

    .card-inner.is-flipped {
      transform: rotateY(180deg);
      -webkit-transform: rotateY(180deg);
    }

    .card-front, .card-back {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border-radius: 10px;
      overflow: hidden;
    }

    .card-front {
      z-index: 2; /* This is the fix that makes it clickable! */
      background-color: #1a1a1a;
      border: 1px solid #333;
      display: flex; align-items: center; justify-content: center;
    }

    .card-front p { color: #555; text-transform: uppercase; pointer-events: none; }

    .card-back {
      transform: rotateY(180deg);
      -webkit-transform: rotateY(180deg);
      z-index: 1;
    }

    .card-back img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>

  <h1>The Femme Fatale Deck</h1>
  <div class="deck-grid">

    <div class="card-container"><div class="card-inner"><div class="card-front"><p>Reveal</p></div><div class="card-back"><img src="Ace Of Cups.jpeg"></div></div></div>
    <div class="card-container"><div class="card-inner"><div class="card-front"><p>Reveal</p></div><div class="card-back"><img src="10 Of Wands.jpeg"></div></div></div>
    <div class="card-container"><div class="card-inner"><div class="card-front"><p>Reveal</p></div><div class="card-back"><img src="Queen Of Pentacles.jpeg"></div></div></div>
    <div class="card-container"><div class="card-inner"><div class="card-front"><p>Reveal</p></div><div class="card-back"><img src="Two Of Swords.jpeg"></div></div></div>
    <div class="card-container"><div class="card-inner"><div class="card-front"><p>Reveal</p></div><div class="card-back"><img src="Page of pentacles.jpeg"></div></div></div>

  </div>

  <script>
    document.querySelectorAll('.card-inner').forEach(card => {
      card.addEventListener('click', function() {
        this.classList.toggle('is-flipped');
      });
    });
  </script>

</body>
</html>
