    <meta charset="UTF-8">

    <title>Femme Fatale Tarot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --noir: #020617;
            --blood: #450a0a;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle at center, #1a0505 0%, #020617 100%);
            color: #f8fafc;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        h1, h2, h3, .card-title {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            letter-spacing: 0.2em;
        }

        .spread-area {
            min-height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
            perspective: 2000px;
            padding: 2rem;
        }

        .card-container {
            width: 220px;
            height: 380px;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card-container:hover {
            transform: translateY(-15px) scale(1.05);
            z-index: 10;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 0.75rem;
            border: 2px solid rgba(197, 160, 89, 0.4);
            box-shadow: 0 15px 45px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        .card-front {
            background: #000;
            transform: rotateY(180deg);
        }

        .card-front img, .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mystic-btn {
            background: rgba(197, 160, 89, 0.05);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0.8rem 2.2rem;
            border-radius: 4px;
            transition: all 0.5s ease;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
        }

        .mystic-btn:hover:not(:disabled) {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.4);
        }

        .mystic-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .glow-border {
            border: 1px solid rgba(197, 160, 89, 0.3);
            background: #050505;
        }

        .loading-shimmer {
            background: linear-gradient(90deg, transparent, rgba(197, 160, 89, 0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--gold);
        }
    </style>
</head>

        async function fetchAIReading(cardName, position = "") {
            const systemPrompt = `You are the Femme Fatale Tarot Oracle. You speak with creative, seductive, and original authority. 
            ABSOLUTELY PROHIBITED WORDS: safeguarded, hall monitor, velvet, ghost, glitch, teeth, ruin, coffee, kitchen, table, sink, mug, jacket, chair, coat, static, shadow, shadows, tooth.
            Do not use generic or plain language. Provide a reading that feels immersive and dark.
            Format JSON only: {"keywords": "...", "reading": "..."}`;

            const userPrompt = `A seeker has drawn ${cardName}${position ? ` for their ${position}` : ''}. Tell them what the cosmos reveals.`;

            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userPrompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { 
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: {
                                        keywords: { type: "STRING" },
                                        reading: { type: "STRING" }
                                    },
                                    required: ["keywords", "reading"]
                                }
                            }
                        })
                    });
                    
                    if (!response.ok) throw new Error('Network Error');
                    const data = await response.json();
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (e) {
                    if (i === 4) throw e;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        const container = document.getElementById('spread-container');
        const modal = document.getElementById('card-modal');
        const modalContent = document.getElementById('modal-content');

        function createCard(cardData, label) {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex flex-col items-center animate-in fade-in slide-in-from-bottom-4 duration-700';
            wrapper.innerHTML = `
                ${label ? `<span class="reading-label text-gold text-xs uppercase tracking-[0.3em] font-black opacity-60 mb-2">${label}</span>` : ''}
                <div class="card-container" onclick="handleFlip(this, ${cardData.id}, '${label || ''}')">
                    <div class="card-inner">
                        <div class="card-back">
                            <img src="BackDesign.png" alt="Card Back" onerror="this.src='Femme Fatale Design.png'">
                        </div>
                        <div class="card-front">
                            <img src="${cardData.file}" alt="${cardData.name}" onerror="this.src='Femme Fatale Design.png'">
                        </div>
                    </div>
                </div>
            `;
            return wrapper;
        }

        function drawSpread(type) {
            clearSpread();
            const shuffled = [...tarotData].sort(() => 0.5 - Math.random());
            if (type === 'daily') {
                container.appendChild(createCard(shuffled[0]));
            } else {
                ['Past', 'Present', 'Future'].forEach((label, i) => {
                    setTimeout(() => container.appendChild(createCard(shuffled[i], label)), i * 200);
                });
            }
        }

        async function handleFlip(el, id, position) {
            if (el.classList.contains('flipped')) {
                showModal(id, position);
                return;
            }
            el.classList.add('flipped');
            setTimeout(() => showModal(id, position), 800);
        }

        async function showModal(id, position) {
            const card = tarotData.find(c => c.id === id);
            document.getElementById('modal-title').innerText = card.name;
            document.getElementById('modal-image').src = card.file;
            
            modal.classList.add('active');
            modalContent.classList.remove('scale-95');

            document.getElementById('reading-text').classList.add('hidden');
            document.getElementById('api-loading').classList.remove('hidden');

            try {
                const result = await fetchAIReading(card.name, position);
                document.getElementById('modal-keywords').innerText = result.keywords;
                document.getElementById('modal-desc').innerText = result.reading;
                document.getElementById('api-loading').classList.add('hidden');
                document.getElementById('reading-text').classList.remove('hidden');
            } catch (err) {
                document.getElementById('api-loading').innerHTML = `<p class="text-red-500 italic uppercase text-xs tracking-widest text-center">The veil is too thick. Check your connection.</p>`;
            }
        }

        function closeModal() {
            modalContent.classList.add('scale-95');
            setTimeout(() => modal.classList.remove('active'), 200);
        }

        function closeModalOnOuter(e) { if (e.target === modal) closeModal(); }
        function clearSpread() { container.innerHTML = ''; }

        window.onload = () => drawSpread('daily');
    </script>
