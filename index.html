<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Femme Fatale Tarot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Fauna+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --deep-purple: #1a1a2e;
            --midnight: #16213e;
        }

        body {
            font-family: 'Fauna One', serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
        }

        .card-container {
            perspective: 1000px;
            width: 200px;
            height: 320px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 12px;
            border: 2px solid var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .card-front {
            background: #000;
            transform: rotateY(180deg);
        }

        .card-front img, .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mystic-button {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 8px 24px;
            border-radius: 9999px;
            font-weight: bold;
        }

        .mystic-button:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 15px var(--gold);
        }

        .glow-text {
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .modal {
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--gold);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Header Section -->
    <header class="text-center mb-12">
        <h1 class="text-4xl md:text-6xl font-bold mb-2 glow-text uppercase">Femme Fatale Tarot</h1>
        <p class="text-gray-400 italic">"The cards only reveal what the soul already knows."</p>
    </header>

    <!-- Controls -->
    <div class="flex justify-center gap-4 mb-12">
        <button onclick="drawCard()" class="mystic-button">Draw Daily Card</button>
        <button onclick="resetDeck()" class="mystic-button">Reset Deck</button>
    </div>

    <!-- Main Deck Grid -->
    <main id="deck-grid" class="flex flex-wrap justify-center gap-8 max-w-7xl mx-auto">
        <!-- Cards will be injected here -->
    </main>

    <!-- Reading Modal -->
    <div id="reading-modal" class="modal fixed inset-0 flex items-center justify-center z-50 hidden p-4" onclick="closeModalOnOuter(event)">
        <div class="bg-[#1a1a2e] border-2 border-[#d4af37] p-8 rounded-xl max-w-4xl w-full text-center relative flex flex-col md:flex-row gap-8" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gold text-2xl z-10">&times;</button>
            
            <div class="md:w-1/2 flex items-center justify-center bg-black rounded-lg">
                <img id="modal-image" src="" alt="Card Art" class="max-h-[60vh] object-contain">
            </div>

            <div class="md:w-1/2 flex flex-col justify-center text-left">
                <h2 id="modal-title" class="text-3xl mb-4 border-b border-gold/20 pb-2 uppercase tracking-widest"></h2>
                
                <div id="reading-container">
                    <p class="text-sm text-gold uppercase tracking-widest mb-1 opacity-60">Keywords</p>
                    <p id="modal-keywords" class="italic text-gray-200 mb-6 text-xl font-light"></p>
                    
                    <div class="max-h-60 overflow-y-auto custom-scrollbar pr-2">
                        <p class="text-sm text-gold uppercase tracking-widest mb-1 opacity-60">The Revelation</p>
                        <p id="modal-desc" class="text-lg leading-relaxed text-gray-300 font-light"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // PASTE YOUR API KEY INSIDE THE QUOTES BELOW
        const apiKey = ""; 

        // EXACT mapping of your provided filenames
        const tarotData = [
            { id: 0, name: "The Fool", file: "The Fool.jpeg", kw: "Leap, Origins, Innocence", d: "A call to take the step that terrifies you. The universe supports your stride." },
            { id: 1, name: "The High Priestess", file: "The High Priestess.jpeg", kw: "Intuition, Mystery, Silence", d: "The answers reside in the spaces between breaths. Listen to the silence." },
            { id: 2, name: "The Empress", file: "The Empress.jpeg", kw: "Abundance, Nurture, Creation", d: "Nature is at its peak. Your ideas are fertile and ready to bloom." },
            { id: 3, name: "The Emperor", file: "Emperor.jpeg", kw: "Authority, Structure, Power", d: "Build a fortress of discipline around your dreams. Leadership requires clear vision." },
            { id: 4, name: "The Hierophant", file: "Heirophant.jpeg", kw: "Tradition, Guidance, Belief", d: "Seek the wisdom of the ages. There is comfort in ritual and shared values." },
            { id: 5, name: "The Lovers", file: "The Lovers.jpeg", kw: "Union, Choice, Alignment", d: "Magnetism of opposites. A crossroads where the heart and soul must agree." },
            { id: 6, name: "The Chariot", file: "The Chariot.jpeg", kw: "Victory, Control, Will", d: "Two forces pull at your reins. Mastery is keeping them headed toward the horizon." },
            { id: 7, name: "Strength", file: "Strength.jpeg", kw: "Courage, Soft Power, Grace", d: "True strength is the lion lying down for the lamb. Tame your inner chaos." },
            { id: 8, name: "The Hermit", file: "The Hermit.jpeg", kw: "Solitude, Truth, Lantern", d: "Withdraw from the noise. Your own internal lantern is the only light you need." },
            { id: 9, name: "Wheel of Fortune", file: "Wheel Of Fortune.jpeg", kw: "Cycles, Fate, Turning Point", d: "The only constant is change. Ride the wheel as it turns." },
            { id: 10, name: "Justice", file: "Justice.jpeg", kw: "Balance, Truth, Clarity", d: "The scales demand honesty. Every action ripples outward; ensure yours are clear." },
            { id: 11, name: "Hanged Man", file: "Hanged Man.jpeg", kw: "Perspective, Pause, Surrender", d: "Sacrifice the old view to see the world anew. In stillness, movement happens." },
            { id: 12, name: "Death", file: "Death.jpeg", kw: "Endings, Transformation, Rebirth", d: "The clearing of the garden. Do not fear the harvest; it makes room for tomorrow." },
            { id: 13, name: "Temperance", file: "Temperance.jpeg", kw: "Alchemy, Balance, Healing", d: "The blending of fire and water. Healing is found in the middle path." },
            { id: 14, name: "The Devil", file: "Devil.jpeg", kw: "Bondage, Attachment, Instinct", d: "The chains are loose, yet you remain. Acknowledge your shadows." },
            { id: 15, name: "The Tower", file: "Tower.jpeg", kw: "Upheaval, Revelation, Change", d: "The lightning strikes what was never solid. Let it fall so truth can breathe." },
            { id: 16, name: "The Star", file: "Star.jpeg", kw: "Hope, Healing, Inspiration", d: "Peace returns to the waters. You are guided by the light that never flickers." },
            { id: 17, name: "The Moon", file: "Moon.jpeg", kw: "Illusion, Fear, Dreams", d: "Navigate the mist. Not everything is as it seems in the silver light." },
            { id: 18, name: "The Sun", file: "The Sun.jpeg", kw: "Success, Vitality, Radiance", d: "Everything is illuminated. The shadows flee before your warmth and clarity." },
            { id: 19, name: "Judgement", file: "Judgement.jpeg", kw: "Awakening, Renewal, Call", d: "The call to rise. Forgive the past and step into your truest self." },
            { id: 20, name: "The World", file: "World.jpeg", kw: "Wholeness, Mastery, Travel", d: "The cycle is complete. You have arrived at the center of your own universe." },
            { id: 21, name: "The Siren", file: "The Siren.jpeg", kw: "Seduction, Depth, Danger", d: "Beware the call that leads to the deep. It is beautiful, but terminal." },
            { id: 22, name: "Ace Of Cups", file: "Ace Of Cups.jpeg", kw: "Love, Overflow, Feelings", d: "A chalice offered by the divine. Your soul is ready for new, wild feelings." },
            { id: 23, name: "10 Of Cups", file: "10 Of Cups.jpeg", kw: "Harmony, Bliss, Home", d: "The ultimate peak of emotional satisfaction. You have found your harbor." },
            { id: 24, name: "Ace Of Wands", file: "Ace Of Wands.jpeg", kw: "Spark, Drive, Inspiration", d: "A burst of creative fire. Run with the torch before the wind changes." },
            { id: 25, name: "Ace Of Swords", file: "Ace Of Swords.jpeg", kw: "Clarity, Logic, Cut", d: "The blade cuts through the fog. A moment of absolute mental sharpness." },
            { id: 26, name: "Ace Of pentacles", file: "Ace Of pentacles.jpeg", kw: "Seed, Wealth, Manifest", d: "A seed of physical manifestation. Plant it deep and watch it grow into gold." },
            { id: 27, name: "8 of Swords", file: "8Of Swords.jpeg", kw: "Mind, Trap, Blindfold", d: "The swords surround you, but the path is open. The prison is in your head." },
            { id: 28, name: "Knight Of Swords", file: "Knnight Of Swords.jpeg", kw: "Action, Rush, Intensity", d: "Charging forward. Speed is your ally, but do not lose your head." },
            { id: 29, name: "Page of pentacles", file: "Page of pentacles.jpeg", kw: "Student, News, Earth", d: "A young apprentice of the earth. A message regarding your physical world arrives." },
            { id: 30, name: "10 Of Pentacles", file: "10 Of Pentacles.jpeg", kw: "Legacy, Abundance, Roots", d: "Wealth that spans generations. A solid foundation is finally built." },
            { id: 31, name: "10 Of Wands", file: "10 Of Wands.jpeg", kw: "Burden, Effort, Completion", d: "The final push. You are carrying the weight, but the finish line is near." }
        ];

        // Automatically map remaining Minor Arcana files provided in list
        const others = ["2 Of Cups.jpeg", "2 Of Pentacles.jpeg", "2 Of Wands.jpeg", "3 Of Cups.jpeg", "3 Of Pentacles.jpeg", "3 Of Wands.jpeg", "4 Of Cups.jpeg", "4 Of Pentacles.jpeg", "4 Of Wands.jpeg", "5 Of Cups.jpeg", "5 Of Pentacles.jpeg", "5 Of Wands.jpeg", "6 Of Cups.jpeg", "6 Of Pentacles.jpeg", "6 Of Wands.jpeg", "7 Of Cups.jpeg", "7 Of Pentacles.jpeg", "7 Of Wands.jpeg", "8 Of Cups.jpeg", "8 Of Pentacles.jpeg", "8 Of Wands.jpeg", "9 Of Cups.jpeg", "9 Of Pentacles.jpeg", "9 Of Wands.jpeg", "King Of Cups.jpeg", "King Of Pentacles.jpeg", "King Of Swords.jpeg", "King Of Wands.jpeg", "Knight Of Cups.jpeg", "Knight Of Pentacles.jpeg", "Knight Of Wands.jpeg", "Page Of Cups.jpeg", "Page Of Swords.jpeg", "Page Of Wands.jpeg", "Queen Of Cups.jpeg", "Queen Of Pentacles.jpeg", "Queen Of Swords.jpeg", "Queen Of Wands.jpeg", "Seven Of Swords.jpeg", "Six Of Swords.jpeg", "Ten Of Swords.jpeg", "Two Of Swords.jpeg", "Three Of Swords.jpeg", "Four Of Swords.jpeg", "Five Of Swords.jpeg", "Nine Of Swords.jpeg"];
        
        others.forEach((f, i) => {
            if(!tarotData.find(c => c.file === f)) {
                tarotData.push({ id: 100+i, name: f.replace('.jpeg',''), file: f, kw: "Fate, Flow, Journey", d: "The Oracle watches. The patterns of this card suggest a shift in your journey." });
            }
        });

        async function fetchAIReading(cardName) {
            if (!apiKey) return null;
            const system = `You are the Femme Fatale Tarot Oracle. Seductive, dark, creative. PROHIBITED: safeguarded, hall monitor, velvet, ghost, glitch, teeth, ruin, coffee, kitchen, table, sink, mug, jacket, chair, coat, static, shadow, shadows, tooth. JSON only: {"keywords": "...", "reading": "..."}`;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{parts: [{text: `Seeker drew ${cardName}`}]}], systemInstruction: {parts: [{text: system}]}, generationConfig: {responseMimeType: "application/json"} })
                });
                const data = await res.json();
                return JSON.parse(data.candidates[0].content.parts[0].text);
            } catch (e) { return null; }
        }

        const grid = document.getElementById('deck-grid');
        const modal = document.getElementById('reading-modal');

        function createCardUI(data) {
            const el = document.createElement('div');
            el.className = 'card-container';
            el.innerHTML = `
                <div class="card-inner" onclick="flipCard(this, ${data.id})">
                    <div class="card-back"><img src="BackDesign.png" onerror="this.src='Femme Fatale Design.png'"></div>
                    <div class="card-front"><img src="${data.file}" onerror="this.src='Femme Fatale Design.png'"></div>
                </div>
            `;
            return el;
        }

        function flipCard(el, id) {
            const parent = el.parentElement;
            if(!parent.classList.contains('flipped')) {
                parent.classList.add('flipped');
                setTimeout(() => showDetails(id), 600);
            } else { showDetails(id); }
        }

        async function showDetails(id) {
            const card = tarotData.find(c => c.id === id);
            document.getElementById('modal-title').innerText = card.name;
            document.getElementById('modal-image').src = card.file;
            document.getElementById('modal-keywords').innerText = card.kw;
            document.getElementById('modal-desc').innerText = card.d;
            modal.classList.remove('hidden');

            if(apiKey) {
                const ai = await fetchAIReading(card.name);
                if(ai) {
                    document.getElementById('modal-keywords').innerText = ai.keywords;
                    document.getElementById('modal-desc').innerText = ai.reading;
                }
            }
        }

        function closeModal() { modal.classList.add('hidden'); }
        function closeModalOnOuter(e) { if(e.target === modal) closeModal(); }

        function drawCard() {
            resetDeck();
            const rand = tarotData[Math.floor(Math.random() * tarotData.length)];
            const ui = createCardUI(rand);
            grid.appendChild(ui);
            setTimeout(() => {
                ui.classList.add('flipped');
                setTimeout(() => showDetails(rand.id), 600);
            }, 100);
        }

        function resetDeck() {
            grid.innerHTML = '';
            tarotData.slice(0, 12).forEach(c => grid.appendChild(createCardUI(c)));
        }

        window.onload = resetDeck;
    </script>
</body>
</html>
