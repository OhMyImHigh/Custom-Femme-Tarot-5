<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Femme Fatale Tarot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      background-color: #050505; 
      color: #e0e0e0; 
      font-family: 'Segoe UI', system-ui, sans-serif; 
      text-align: center; 
      padding: 50px 15px;
    }

    h1 { 
      font-size: 2.2rem;
      letter-spacing: 5px; 
      text-transform: uppercase; 
      margin-bottom: 60px; 
      font-weight: 200;
      color: #ffffff;
    }

    .deck-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
      gap: 35px; 
      justify-items: center; 
      max-width: 1400px; 
      margin: 0 auto; 
    }

    .card-container { 
      width: 220px; 
      height: 360px; 
      perspective: 1200px; 
      cursor: pointer;
    }

    .card-inner { 
      width: 100%; 
      height: 100%; 
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); 
      transform-style: preserve-3d; 
      position: relative; 
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }

    .card-inner.is-flipped { 
      transform: rotateY(180deg); 
    }

    .card-front, .card-back { 
      backface-visibility: hidden; 
      position: absolute; 
      top: 0; left: 0; 
      width: 100%; height: 100%; 
      border-radius: 12px; 
      overflow: hidden; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .card-front { 
      z-index: 2; 
      background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
    }

    .card-front p { 
      color: #555; 
      text-transform: uppercase; 
      font-size: 0.75rem; 
      letter-spacing: 2px;
    }

    .card-back { 
      transform: rotateY(180deg); 
      z-index: 1; 
      background-color: #000;
    }

    /* Error state if image fails */
    .card-back.load-error {
      background-color: #300;
      font-size: 10px;
      padding: 10px;
      color: #f66;
    }

    .card-back img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      display: block;
    }
  </style>
</head>
<body>

  <h1>Femme Fatale Tarot</h1>
  <div class="deck-grid" id="grid"></div>

  <script>
    // EXACT names from your GitHub screenshot (Screenshot 385.jpg)
    const majorArcana = [
      "The Fool (The Siren)", 
      "The Magician (The Mirror Queen)", 
      "The High Priestess (The Power Femme)", 
      "The Empress (The Protector)", 
      "The Emperor (The Old Spell)", 
      "The Heirophant (The Lovers and Liars)", 
      "The Chariot (The Getaway)", 
      "Strength (The Soft Knife)", 
      "The Hermit (The Night Watcher)", 
      "Wheel Of Fortune (The Roulette)", 
      "Justice (The Balance Act)", 
      "The Hanged Man (The Hanging Heart)", 
      "Death (The Burn)", 
      "Temperance (The Alchemy)", 
      "The Devil (The Addiction)", 
      "The Tower (The Shatter)", 
      "The Star (The Afterlight)", 
      "The Moon (The Moonmilk)", 
      "The Sun (The Glow Up)", 
      "Judgement (The Wake-Up Call)", 
      "The World (The Crowned Self)"
    ];

    const wands = ["Ace Of Wands", "2 Of Wands", "3 Of Wands", "4 Of Wands", "5 Of Wands", "6 Of Wands", "7 Of Wands", "8 Of Wands", "9 Of Wands", "10 Of Wands", "Page Of Wands", "Knight Of Wands", "Queen Of Wands", "King Of Wands"];
    const cups = ["Ace Of Cups", "2 Of Cups", "3 Of Cups", "4 Of Cups", "5 Of Cups", "6 Of Cups", "7 Of Cups", "8 Of Cups", "9 Of Cups", "10 Of Cups", "Page Of Cups", "Knight Of Cups", "Queen Of Cups", "King Of Cups"];
    
    // Using digits and the specific '8Of' / 'Knnight' variants you have in your folder
    const swords = ["Ace Of Swords", "Two Of Swords", "Three Of Swords", "Four Of Swords", "Five Of Swords", "Six Of Swords", "Seven Of Swords", "8Of Swords", "Nine Of Swords", "Ten Of Swords", "Page Of Swords", "Knnight Of Swords", "Queen Of Swords", "King Of Swords"];
    
    // Using your specific lowercase 'pentacles' for Ace/Page
    const pentacles = ["Ace Of pentacles", "2 Of Pentacles", "3 Of Pentacles", "4 Of Pentacles", "5 Of Pentacles", "6 Of Pentacles", "7 Of Pentacles", "8 Of Pentacles", "9 Of Pentacles", "10 Of Pentacles", "Page of pentacles", "Knight Of Pentacles", "Queen Of Pentacles", "King Of Pentacles"];

    const fullDeck = [...majorArcana, ...wands, ...cups, ...swords, ...pentacles];
    const grid = document.getElementById('grid');
    
    // The Direct path to your files
    const repoBase = "https://raw.githubusercontent.com/OhMyImHigh/Custom-Femme-Tarot-5/main/";

    fullDeck.forEach(name => {
      const container = document.createElement('div');
      container.className = 'card-container';
      
      const cardInner = document.createElement('div');
      cardInner.className = 'card-inner';
      
      const cardFront = document.createElement('div');
      cardFront.className = 'card-front';
      cardFront.innerHTML = '<p>Reveal</p>';
      
      const cardBack = document.createElement('div');
      cardBack.className = 'card-back';
      
      const img = document.createElement('img');
      img.alt = name;
      img.loading = "lazy";
      
      // Constructing the exact URL. GitHub needs spaces to be %20.
      const fileName = name + ".jpeg";
      img.src = repoBase + encodeURIComponent(fileName);

      // If .jpeg fails, try .jpg as a backup
      img.onerror = () => {
        if (img.src.includes(".jpeg")) {
            img.src = repoBase + encodeURIComponent(name + ".jpg");
        } else {
            // Final fail: show the user the name so we can fix the typo
            cardBack.classList.add('load-error');
            cardBack.innerHTML = `<span>Error Loading:</span><br><strong>${name}</strong>`;
        }
      };

      cardBack.appendChild(img);
      cardInner.appendChild(cardFront);
      cardInner.appendChild(cardBack);
      container.appendChild(cardInner);
      
      container.onclick = () => cardInner.classList.toggle('is-flipped');
      grid.appendChild(container);
    });
  </script>
</body>
</html>
